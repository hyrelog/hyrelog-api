# Production deploy: ECR push + ECS rolling update (hyrelog-api + hyrelog-worker)
#
# This workflow uses OIDC role assumption only.
# Required repository secrets:
#   AWS_DEPLOY_ROLE_ARN
#   AWS_REGION
#   ECR_API_REPOSITORY
#   ECR_WORKER_REPOSITORY
#   ECS_CLUSTER
#   ECS_SERVICE_API
#   ECS_SERVICE_WORKER
#
# Migrations are intentionally not run here; run from a private network path.
name: deploy-production

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-production-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Validate required deploy secrets
        run: |
          set -euo pipefail
          test -n "${{ secrets.ECR_API_REPOSITORY }}"
          test -n "${{ secrets.ECR_WORKER_REPOSITORY }}"
          test -n "${{ secrets.ECS_CLUSTER }}"
          test -n "${{ secrets.ECS_SERVICE_API }}"
          test -n "${{ secrets.ECS_SERVICE_WORKER }}"

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        run: |
          set -euo pipefail
          docker build -f services/api/Dockerfile -t "$ECR_API:$IMAGE_TAG" -t "$ECR_API:latest" .
          docker push "$ECR_API:$IMAGE_TAG"
          docker push "$ECR_API:latest"
        env:
          ECR_API: ${{ secrets.ECR_API_REPOSITORY }}

      - name: Build and push Worker image
        run: |
          set -euo pipefail
          docker build -f services/worker/Dockerfile -t "$ECR_WORKER:$IMAGE_TAG" -t "$ECR_WORKER:latest" .
          docker push "$ECR_WORKER:$IMAGE_TAG"
          docker push "$ECR_WORKER:latest"
        env:
          ECR_WORKER: ${{ secrets.ECR_WORKER_REPOSITORY }}

      # Pinned task definition images (e.g. ...:20260428-...-iamonly) are not updated by
      # --force-new-deployment; register a new revision with the SHA tag CI just pushed.
      - name: Register task definitions and deploy API + Worker
        env:
          ECR_API: ${{ secrets.ECR_API_REPOSITORY }}
          ECR_WORKER: ${{ secrets.ECR_WORKER_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
          ECS_CLUSTER: ${{ secrets.ECS_CLUSTER }}
          ECS_SERVICE_API: ${{ secrets.ECS_SERVICE_API }}
          ECS_SERVICE_WORKER: ${{ secrets.ECS_SERVICE_WORKER }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          set -euo pipefail
          register_and_deploy() {
            local family="$1"
            local full_image="$2"
            local service="$3"
            local src register_tmp out rev
            src="$(mktemp)"
            register_tmp="$(mktemp)"
            aws ecs describe-task-definition \
              --task-definition "$family" \
              --region "${AWS_REGION}" \
              --query 'taskDefinition' \
              --output json > "${src}"

            jq --arg IMG "$full_image" \
              'del(
                .taskDefinitionArn,
                .revision,
                .status,
                .compatibilities,
                .registeredAt,
                .registeredBy,
                .requiresAttributes,
                .tags,
                .deregisteredAt,
                .enableFaultInjection
              )
              | del(.capacityProviderStrategy)
              | del(.launchType)
              | .containerDefinitions[0].image = $IMG
              ' "${src}" > "${register_tmp}"
            rm -f "${src}"

            jq empty "${register_tmp}"
            out="$(aws ecs register-task-definition \
              --cli-input-json "file://${register_tmp}" \
              --region "${AWS_REGION}" \
              --output json)"
            rm -f "${register_tmp}"

            rev="$(echo "${out}" | jq -r '[.taskDefinition.family, (.taskDefinition.revision | tostring)] | join(":")')"

            aws ecs update-service \
              --cluster "${ECS_CLUSTER}" \
              --service "${service}" \
              --task-definition "${rev}" \
              --region "${AWS_REGION}" \
              --force-new-deployment \
              --no-cli-pager
          }

          register_and_deploy "hyrelog-api" "${ECR_API}:${IMAGE_TAG}" "${ECS_SERVICE_API}"
          register_and_deploy "hyrelog-worker" "${ECR_WORKER}:${IMAGE_TAG}" "${ECS_SERVICE_WORKER}"

      - name: Wait for API service stability
        run: |
          set -euo pipefail
          aws ecs wait services-stable --cluster "$ECS_CLUSTER" --services "$ECS_SERVICE_API" --region "$AWS_REGION"
        env:
          ECS_CLUSTER: ${{ secrets.ECS_CLUSTER }}
          ECS_SERVICE_API: ${{ secrets.ECS_SERVICE_API }}
          AWS_REGION: ${{ secrets.AWS_REGION }}

      - name: Wait for Worker service stability
        run: |
          set -euo pipefail
          aws ecs wait services-stable --cluster "$ECS_CLUSTER" --services "$ECS_SERVICE_WORKER" --region "$AWS_REGION"
        env:
          ECS_CLUSTER: ${{ secrets.ECS_CLUSTER }}
          ECS_SERVICE_WORKER: ${{ secrets.ECS_SERVICE_WORKER }}
          AWS_REGION: ${{ secrets.AWS_REGION }}

      - name: On failure — recent ECS events (no secrets)
        if: failure()
        run: |
          aws ecs describe-services --cluster "$ECS_CLUSTER" --services "$ECS_SERVICE_API" "$ECS_SERVICE_WORKER" --region "$AWS_REGION" --query 'services[*].events[:5]' --output json || true
        env:
          ECS_CLUSTER: ${{ secrets.ECS_CLUSTER }}
          ECS_SERVICE_API: ${{ secrets.ECS_SERVICE_API }}
          ECS_SERVICE_WORKER: ${{ secrets.ECS_SERVICE_WORKER }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
