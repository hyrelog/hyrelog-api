# Production deploy: ECR push + ECS rolling update (hyrelog-api + hyrelog-worker)
#
# This workflow uses OIDC role assumption only.
# Required repository secrets:
#   AWS_DEPLOY_ROLE_ARN
#   AWS_REGION
#   ECR_API_REPOSITORY
#   ECR_WORKER_REPOSITORY
#   ECS_CLUSTER
#   ECS_SERVICE_API
#   ECS_SERVICE_WORKER
#
# Migrations are intentionally not run here; run from a private network path.
name: deploy-production

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-production-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Validate required deploy secrets
        run: |
          set -euo pipefail
          test -n "${{ secrets.ECR_API_REPOSITORY }}"
          test -n "${{ secrets.ECR_WORKER_REPOSITORY }}"
          test -n "${{ secrets.ECS_CLUSTER }}"
          test -n "${{ secrets.ECS_SERVICE_API }}"
          test -n "${{ secrets.ECS_SERVICE_WORKER }}"

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        run: |
          set -euo pipefail
          docker build -f services/api/Dockerfile -t "$ECR_API:$IMAGE_TAG" -t "$ECR_API:latest" .
          docker push "$ECR_API:$IMAGE_TAG"
          docker push "$ECR_API:latest"
        env:
          ECR_API: ${{ secrets.ECR_API_REPOSITORY }}

      - name: Build and push Worker image
        run: |
          set -euo pipefail
          docker build -f services/worker/Dockerfile -t "$ECR_WORKER:$IMAGE_TAG" -t "$ECR_WORKER:latest" .
          docker push "$ECR_WORKER:$IMAGE_TAG"
          docker push "$ECR_WORKER:latest"
        env:
          ECR_WORKER: ${{ secrets.ECR_WORKER_REPOSITORY }}

      - name: Deploy API service (new image)
        run: |
          set -euo pipefail
          aws ecs update-service --cluster "$ECS_CLUSTER" --service "$ECS_SERVICE_API" --force-new-deployment
        env:
          ECS_CLUSTER: ${{ secrets.ECS_CLUSTER }}
          ECS_SERVICE_API: ${{ secrets.ECS_SERVICE_API }}

      - name: Deploy Worker service (new image)
        run: |
          set -euo pipefail
          aws ecs update-service --cluster "$ECS_CLUSTER" --service "$ECS_SERVICE_WORKER" --force-new-deployment
        env:
          ECS_CLUSTER: ${{ secrets.ECS_CLUSTER }}
          ECS_SERVICE_WORKER: ${{ secrets.ECS_SERVICE_WORKER }}

      - name: Wait for API service stability
        run: |
          set -euo pipefail
          aws ecs wait services-stable --cluster "$ECS_CLUSTER" --services "$ECS_SERVICE_API"
        env:
          ECS_CLUSTER: ${{ secrets.ECS_CLUSTER }}
          ECS_SERVICE_API: ${{ secrets.ECS_SERVICE_API }}

      - name: Wait for Worker service stability
        run: |
          set -euo pipefail
          aws ecs wait services-stable --cluster "$ECS_CLUSTER" --services "$ECS_SERVICE_WORKER"
        env:
          ECS_CLUSTER: ${{ secrets.ECS_CLUSTER }}
          ECS_SERVICE_WORKER: ${{ secrets.ECS_SERVICE_WORKER }}

      - name: On failure — recent ECS events (no secrets)
        if: failure()
        run: |
          aws ecs describe-services --cluster "$ECS_CLUSTER" --services "$ECS_SERVICE_API" "$ECS_SERVICE_WORKER" --query 'services[*].events[:5]' --output json || true
        env:
          ECS_CLUSTER: ${{ secrets.ECS_CLUSTER }}
          ECS_SERVICE_API: ${{ secrets.ECS_SERVICE_API }}
          ECS_SERVICE_WORKER: ${{ secrets.ECS_SERVICE_WORKER }}
