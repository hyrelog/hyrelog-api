# Hyrelog-api monorepo — lint, typecheck, and production Docker build (no push)
name: checks

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  api-and-worker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate (API)
        run: npm run prisma:generate --workspace=services/api
        env:
          DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/hyrelog_ci?schema=public

      - name: Lint (API, if available)
        run: npm run lint --workspace=services/api --if-present
        continue-on-error: true

      - name: Typecheck (API)
        run: npm run typecheck --workspace=services/api

      - name: Typecheck (Worker)
        run: npm run typecheck --workspace=services/worker

      - name: Build (API)
        run: npm run build --workspace=services/api

      - name: Build (Worker)
        run: npm run build --workspace=services/worker

      - name: Verify Docker builds (no push)
        run: |
          docker build -f services/api/Dockerfile -t hyrelog-api:ci .
          docker build -f services/worker/Dockerfile -t hyrelog-worker:ci .
